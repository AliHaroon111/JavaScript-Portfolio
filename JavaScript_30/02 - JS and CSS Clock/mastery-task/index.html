<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS + CSS Clock</title>
  <link rel="icon" href="https://fav.farm/🔥" />
</head>
<body>


    <div class="clock">
      <div class="clock-face">
        <div class="needle"></div>
      </div>
    </div>
    <div class="display-load">Current load :<span class="load-value">0</span></div>


  <style>
    html {
      background: #018DED url(https://unsplash.it/1500/1000?image=881&blur=5);
      background-size: cover;
      font-family: 'helvetica neue';
      text-align: center;
      font-size: 10px;
    }

    body {
      margin: 0;
      font-size: 2rem;
      display: flex;
      flex: 1;
      min-height: 100vh;
      align-items: center;
    }

    .clock {
      width: 30rem;
      height: 30rem;
      border: 20px solid white;
      border-radius: 50%;
      margin: 50px auto;
      position: relative;
      padding: 2rem;
      box-shadow:
        0 0 0 4px rgba(0,0,0,0.1),
        inset 0 0 0 3px #EFEFEF,
        inset 0 0 10px black,
        0 0 10px rgba(0,0,0,0.2);
    }

    .clock-face {
      position: relative;
      width: 100%;
      height: 100%;
      transform: translateY(-3px); /* account for the height of the clock hands */
    }

    .needle {
  width: 50%;
  height: 4px; /* Thinner than the clock hand */
  background: black;
  position: absolute;
  top: 50%;
  /* The "Pro" Needle Look: Pointy at one end */
  border-radius: 50% 0 0 50%; 
  transform-origin: 100%; 
  transform: rotate(90deg);
  transition: all 0.5s cubic-bezier(0.1, 2.7, 0.58, 1);
}

.display-load {
  font-family: 'helvetica neue', sans-serif;
  font-size: 3rem;
  margin-top: 20px;
  color: white;
}
  </style>
  <script>

    const needle = document.querySelector('.needle')
    const loadText = document.querySelector('.load-value')
    function updateGauge(){
      const cpuUsage = Math.floor(Math.random()*101)
      const cpuDegrees = ((cpuUsage/100)*180) + 90
      needle.style.transform = `rotate(${cpuDegrees}deg)`
        //Update the text display
      loadText.textContent = cpuUsage
    
      if(cpuUsage>=80){
        needle.style.background = 'red'
        loadText.style.color = 'red'
      } else {
        needle.style.background = 'rgb(0, 255, 0)'; // Green
        loadText.style.color = 'white';
      }

    }

  setInterval(updateGauge, 2000);
 
  </script>
</body>
</html>
